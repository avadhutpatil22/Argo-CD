apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: weather-app

resources:
  - ../../base

nameSuffix: -blue

patches:
  - patch: |-
      - op: replace
        path: /spec/template/metadata/labels/slot
        value: blue
      - op: replace
        path: /metadata/name
        value: weather-app-blue
    target:
      kind: Deployment
      name: weather-app

images:
  - name: ghcr.io/<your-org>/weather-app
    newTag: "1.0.0"     # stable release — blue slot
