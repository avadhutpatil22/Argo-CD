##############################################################
# preview-service.yaml
# Points at the INACTIVE (staging) slot for pre-release tests.
# Update the `slot` selector to mirror active-service cutover.
##############################################################
apiVersion: v1
kind: Service
metadata:
  name: my-app-preview
  namespace: my-app
  labels:
    app: my-app
    role: preview
  annotations:
    deployment.blue-green/preview-slot: "green"
spec:
  selector:
    app: my-app
    slot: green         # <-- change to "blue" during cutover
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
