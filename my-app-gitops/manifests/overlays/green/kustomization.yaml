apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: my-app

resources:
  - ../../base

nameSuffix: -green

patches:
  # Override the slot label on the Pod template
  - patch: |-
      - op: replace
        path: /spec/template/metadata/labels/slot
        value: green
      - op: replace
        path: /metadata/name
        value: my-app-green
    target:
      kind: Deployment
      name: my-app

images:
  - name: nginx
    newTag: "1.27.0"   # pin the NEW candidate image for the green slot
