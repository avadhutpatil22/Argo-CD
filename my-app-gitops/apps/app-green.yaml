##############################################################
# argocd/app-green.yaml
# Argo CD Application — Green slot
# Apply with: kubectl apply -f argocd/app-green.yaml -n argocd
##############################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-green
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: my-app
    deployment.blue-green/slot: green
  annotations:
    argocd-image-updater.argoproj.io/image-list: nginx=nginx
    argocd-image-updater.argoproj.io/nginx.update-strategy: semver
    argocd-image-updater.argoproj.io/nginx.allow-tags: "~1.27"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/<your-org>/<your-repo>.git  # <-- update
    targetRevision: main
    path: manifests/overlays/green

  destination:
    server: https://kubernetes.default.svc
    namespace: my-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences: []
